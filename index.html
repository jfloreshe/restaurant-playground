<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Layout Editor</title>
    <style>
      :root {
        --bg: #0d1017;
        --panel: #161b26;
        --text: #dae1ee;
        --muted: #8d98ac;
        --accent: #59b3ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: radial-gradient(circle at 20% 20%, #1c2433, #0a0d13 60%);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      #app {
        width: min(98vw, 1960px);
        margin: 14px auto 32px;
        display: grid;
        gap: 14px;
      }

      .header {
        padding: 12px 14px;
        border: 1px solid #2f3a52;
        border-radius: 10px;
        background: color-mix(in srgb, var(--panel) 88%, transparent);
      }

      .header-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
      }

      .header-sub {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .editor-card {
        border: 1px solid #2f3a52;
        border-radius: 10px;
        background: color-mix(in srgb, var(--panel) 84%, transparent);
        padding: 10px;
        display: grid;
        gap: 8px;
      }

      .editor-title {
        font-size: 12px;
        color: #9eb2d1;
        letter-spacing: 0.4px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .tool-group {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .zoom-group {
        margin-left: auto;
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .viewport-shell {
        width: min(100%, calc(var(--native-w) * 1px));
        aspect-ratio: var(--native-w) / var(--native-h);
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #31415e;
        background: #090d15;
      }

      .canvas {
        width: 100%;
        height: 100%;
        display: block;
        cursor: crosshair;
      }

      .tool-btn {
        border: 1px solid #3a4a68;
        background: #1a2232;
        color: var(--text);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        cursor: pointer;
      }

      .tool-btn[data-active="true"] {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 65%, transparent);
      }

      .sign-text {
        width: 92px;
        border: 1px solid #3a4a68;
        background: #121a29;
        color: var(--text);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        outline: none;
      }

      .zoom-btn {
        width: 30px;
        padding: 6px 0;
        text-align: center;
      }

      .zoom-input {
        width: 68px;
        text-align: center;
        border: 1px solid #3a4a68;
        background: #121a29;
        color: var(--text);
        border-radius: 6px;
        padding: 6px 4px;
        font-size: 12px;
        outline: none;
      }

      @media (max-width: 960px) {
        #app {
          width: 98vw;
        }
        .zoom-group {
          width: 100%;
          margin-left: 0;
          justify-content: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
