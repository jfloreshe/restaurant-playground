<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Layout Editor</title>
    <style>
      :root {
        --bg: #0d1017;
        --panel: #161b26;
        --text: #dae1ee;
        --muted: #8d98ac;
        --accent: #59b3ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: radial-gradient(circle at 20% 20%, #1c2433, #0a0d13 60%);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      #app {
        width: min(98vw, 1960px);
        margin: 14px auto 32px;
        display: grid;
        gap: 14px;
      }

      .header {
        padding: 12px 14px;
        border: 1px solid #2f3a52;
        border-radius: 10px;
        background: color-mix(in srgb, var(--panel) 88%, transparent);
      }

      .header-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
      }

      .header-sub {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .header-controls {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .preset-label {
        font-size: 12px;
        color: #afc2df;
      }

      .preset-select {
        border: 1px solid #3a4a68;
        background: #121a29;
        color: var(--text);
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 12px;
        outline: none;
      }

      .editor-card {
        border: 1px solid #2f3a52;
        border-radius: 10px;
        background: color-mix(in srgb, var(--panel) 84%, transparent);
        padding: 10px;
        display: grid;
        gap: 8px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.32);
      }

      .editor-title {
        font-size: 12px;
        color: #9eb2d1;
        letter-spacing: 0.4px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .tool-group {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }

      .zoom-group {
        margin-left: auto;
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .viewport-shell {
        width: min(100%, calc(var(--native-w) * 1px));
        aspect-ratio: var(--native-w) / var(--native-h);
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #31415e;
        background: #090d15;
      }

      .canvas {
        width: 100%;
        height: 100%;
        display: block;
        cursor: crosshair;
        touch-action: none;
      }

      .label-layer {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .element-ui-shell {
        position: absolute;
        inset: auto auto auto auto;
        overflow: hidden;
        pointer-events: none;
      }

      .element-ui-content {
        pointer-events: none;
      }

      .ui-card {
        display: grid;
        gap: 6px;
        width: 100%;
        height: 100%;
        align-content: start;
      }

      .ui-card-name {
        background: rgba(12, 16, 24, 0.88);
        border: 1px solid #3f5b86;
        color: #dce9ff;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 15px;
        font-weight: 600;
        line-height: 1;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }

      .ui-card-state {
        width: fit-content;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        padding: 5px 10px;
        color: #ebf5ff;
        border: 1px solid rgba(255, 255, 255, 0.2);
        text-transform: uppercase;
      }

      .ui-card-state.is-open {
        background: rgba(35, 145, 86, 0.78);
      }

      .ui-card-state.is-using {
        background: rgba(198, 118, 27, 0.8);
      }

      .ui-card-state.is-reserved {
        background: rgba(40, 112, 194, 0.82);
      }

      .ui-card-state.is-closed {
        background: rgba(130, 46, 46, 0.82);
      }

      .ui-table {
        width: 100%;
        height: 100%;
        border-radius: 10px;
        padding: 10px;
        display: grid;
        grid-template-rows: 1fr auto;
        align-content: space-between;
        overflow: hidden;
      }

      .ui-table .name {
        font-size: 16px;
        font-weight: 800;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }

      .ui-table .state {
        width: fit-content;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
        padding: 5px 10px;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .ui-table .state.is-open {
        background: rgba(35, 145, 86, 0.78);
      }

      .ui-table .state.is-using {
        background: rgba(198, 118, 27, 0.8);
      }

      .ui-table .state.is-reserved {
        background: rgba(40, 112, 194, 0.82);
      }

      .ui-table .state.is-closed {
        background: rgba(130, 46, 46, 0.82);
      }

      .ui-table-v0 {
        color: #eff6ff;
        background: linear-gradient(140deg, rgba(44, 88, 152, 0.92), rgba(24, 42, 79, 0.92));
        border: 1px solid rgba(139, 184, 255, 0.5);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.07);
      }

      .ui-table-v0 .line {
        grid-row: 1;
        align-self: start;
        width: 34%;
        height: 4px;
        border-radius: 999px;
        background: rgba(183, 217, 255, 0.92);
      }

      .ui-table-v1 {
        color: #18202e;
        background: linear-gradient(150deg, rgba(239, 230, 208, 0.95), rgba(227, 209, 173, 0.93));
        border: 1px solid rgba(114, 90, 45, 0.44);
      }

      .ui-table-v1 .name {
        border-left: 6px solid rgba(122, 84, 20, 0.7);
        padding-left: 8px;
      }

      .ui-table-v2 {
        color: #e5fff8;
        background: linear-gradient(150deg, rgba(16, 84, 77, 0.95), rgba(16, 58, 60, 0.95));
        border: 1px solid rgba(120, 228, 194, 0.38);
      }

      .ui-table-v2 .name {
        letter-spacing: 0.2px;
      }

      .table-tooltip {
        position: absolute;
        z-index: 30;
        display: none;
        gap: 8px;
        min-width: 210px;
        max-width: 260px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #3c4f73;
        background: rgba(14, 20, 31, 0.94);
        backdrop-filter: blur(4px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }

      .tip-title {
        font-size: 12px;
        color: #bfd6ff;
        font-weight: 700;
      }

      .tip-name,
      .tip-state {
        border: 1px solid #3a4a68;
        background: #121a29;
        color: var(--text);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        outline: none;
      }

      .tip-actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
      }

      .tip-btn {
        border: 1px solid #43587a;
        background: #1b263a;
        color: #dde8fb;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 11px;
        cursor: pointer;
      }

      .tool-btn {
        border: 1px solid #3a4a68;
        background: #1a2232;
        color: var(--text);
        border-radius: 6px;
        padding: 7px 10px;
        min-height: 34px;
        font-size: 12px;
        cursor: pointer;
      }

      .tool-btn[data-active="true"] {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 65%, transparent);
      }

      .sign-text {
        width: 92px;
        border: 1px solid #3a4a68;
        background: #121a29;
        color: var(--text);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        outline: none;
      }

      .zoom-btn {
        width: 30px;
        padding: 6px 0;
        text-align: center;
      }

      .zoom-input {
        width: 68px;
        text-align: center;
        border: 1px solid #3a4a68;
        background: #121a29;
        color: var(--text);
        border-radius: 6px;
        padding: 6px 4px;
        font-size: 12px;
        outline: none;
      }

      @media (max-width: 960px) {
        #app {
          width: 98vw;
        }
        .zoom-group {
          width: 100%;
          margin-left: 0;
          justify-content: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
